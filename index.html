<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FeedFlow — Agregador RSS</title>
  <meta name="description" content="Agregador RSS moderno. Adicione qualquer site e descubra seus feeds automaticamente." />
  <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
  <link rel="stylesheet" href="src/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="6" cy="26" r="3" fill="currentColor"/>
          <path d="M3 16 C3 16 16 16 16 3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M3 9 C3 9 23 9 23 3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
          <path d="M3 23 C3 23 9 23 9 16 C9 9 23 9 23 3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.3"/>
        </svg>
        <span class="logo-text">FeedFlow</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" title="Fechar menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="sidebar-section">
      <h3 class="sidebar-label">Adicionar Feed</h3>
      <div class="add-feed-form">
        <input
          type="url"
          id="urlInput"
          class="url-input"
          placeholder="https://exemplo.com"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn-add" id="btnAdd">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adicionar
        </button>
      </div>
      <div class="feed-status" id="feedStatus"></div>
    </div>

    <div class="sidebar-section sidebar-feeds">
      <div class="sidebar-label-row">
        <h3 class="sidebar-label">Inscrições</h3>
        <span class="feed-count" id="feedCount">0</span>
      </div>
      <ul class="feed-list" id="feedList">
        <li class="feed-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>
          Nenhuma inscrição ainda
        </li>
      </ul>
    </div>

    <div class="sidebar-footer">
      <button class="btn-ghost" id="btnImportOPML" title="Importar OPML">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importar OPML
      </button>
      <button class="btn-ghost" id="btnExportOPML" title="Exportar OPML">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar OPML
      </button>
      <input type="file" id="opmlFileInput" accept=".opml,.xml" style="display:none" />
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" title="Abrir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <div class="topbar-filters">
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="unread">Não lidos</button>
        <button class="filter-btn" data-filter="starred">Salvos</button>
      </div>

      <div class="topbar-actions">
        <button class="btn-icon" id="btnRefresh" title="Atualizar feeds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button class="btn-icon" id="btnMarkAllRead" title="Marcar todos como lido">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="btn-icon" id="btnToggleTheme" title="Alternar tema">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-sun" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </header>

    <div class="content-area" id="contentArea">
      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-illustration">
          <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="96" r="10" fill="currentColor" opacity="0.9"/>
            <path d="M14 60 C14 60 60 60 60 14" stroke="currentColor" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>
            <path d="M14 38 C14 38 82 38 82 14" stroke="currentColor" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.4"/>
            <path d="M14 82 C14 82 38 82 38 60 C38 38 82 38 82 14" stroke="currentColor" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.2"/>
          </svg>
        </div>
        <h2 class="empty-title">Nenhum feed ainda</h2>
        <p class="empty-desc">Cole a URL de qualquer site no campo ao lado.<br/>Detectamos o feed RSS/Atom automaticamente.</p>
        <div class="empty-examples">
          <span class="example-label">Exemplos:</span>
          <button class="example-url" data-url="https://www.theverge.com">theverge.com</button>
          <button class="example-url" data-url="https://hnrss.org/frontpage">Hacker News</button>
          <button class="example-url" data-url="https://feeds.folha.uol.com.br/emcimadahora/rss091.xml">Folha</button>
        </div>
      </div>

      <!-- Articles Grid -->
      <div class="articles-grid" id="articlesGrid" style="display:none"></div>

      <!-- Loading State -->
      <div class="loading-state" id="loadingState" style="display:none">
        <div class="spinner"></div>
        <p>Buscando artigos...</p>
      </div>
    </div>
  </main>

  <!-- ARTICLE MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="articleModal">
      <div class="modal-header">
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-actions">
          <button class="btn-icon" id="btnModalStar" title="Salvar artigo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
          <a class="btn-icon" id="btnModalOpen" href="#" target="_blank" rel="noopener" title="Abrir original">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>
          <button class="btn-icon" id="btnModalClose" title="Fechar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="src/js/storage.js"></script>
  <script src="src/js/feed-detector.js"></script>
  <script src="src/js/feed-parser.js"></script>
  <script src="src/js/opml.js"></script>
  <script src="src/js/ui.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
